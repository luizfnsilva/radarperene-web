<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Perene Semanal — temporariamente suspenso · Radar Perene</title>
<meta name="description" content="O Perene Semanal está temporariamente suspenso. O diário público do Radar Perene continua, aberto a todos, em /diario.">
<meta name="robots" content="noindex,follow">
<link rel="canonical" href="https://radarperene.com.br/assine/">
<link rel="alternate" hreflang="pt-br" href="https://radarperene.com.br/assine/">
<link rel="alternate" hreflang="en" href="https://radarperene.com/subscribe/">
<link rel="alternate" hreflang="x-default" href="https://radarperene.com/subscribe/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#faf9f6; --surface:#ffffff; --line:#e6e3dc; --txt:#1a1a2e; --txt2:#3a3a45; --dim:#6e6e78;
    --gold:#a8651a; --gold-ink:#94560f;
    --serif:'Newsreader',Georgia,serif; --sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  :root[data-theme="dark"]{
    --bg:#0e1217; --surface:#161b22; --line:#28303a; --txt:#eceef1; --txt2:#c2c8d0; --dim:#8a929e; --gold:#d9a441; --gold-ink:#d9a441;
  }
  @media (prefers-color-scheme: dark){ :root:not([data-theme="light"]){
    --bg:#0e1217; --surface:#161b22; --line:#28303a; --txt:#eceef1; --txt2:#c2c8d0; --dim:#8a929e; --gold:#d9a441; --gold-ink:#d9a441;
  }}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:var(--gold-ink)}
  .top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding:18px 22px;max-width:640px;margin:0 auto}
  .brand{font-family:var(--serif);font-weight:600;font-size:18px;text-decoration:none;color:var(--txt)}
  main{max-width:560px;margin:0 auto;padding:60px 22px 40px;text-align:center}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:14px}
  h1{font-family:var(--serif);font-weight:500;font-size:clamp(24px,4vw,34px);line-height:1.3;margin:0 0 18px}
  p{color:var(--txt2);font-size:16px;margin:0 0 14px}
  .cta{display:inline-block;margin-top:16px;font-weight:600;text-decoration:none;color:var(--gold-ink);border-bottom:2px solid var(--gold-ink);padding-bottom:2px}
  footer{border-top:1px solid var(--line);margin-top:50px;padding:24px 0 36px;color:var(--dim);font-size:12px;text-align:center}
</style>
<script>(function(){try{var t=localStorage.getItem("rp-theme");if(t==="light"||t==="dark")document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
</head>
<body>
<div class="top">
  <a class="brand" href="/">Radar Perene</a>
  <a href="/diario">Diário público →</a>
</div>
<main>
  <div class="eyebrow">Assinaturas</div>
  <h1>O Perene Semanal está temporariamente suspenso.</h1>
  <p>O diário público continua, aberto a todos, em <a href="/diario">/diario</a>.</p>
  <p>Nenhum dado de assinantes existentes foi alterado.</p>
  <a class="cta" href="/diario">Ler a edição aberta de hoje →</a>
</main>
<footer>© Radar Perene · <a href="/">radarperene.com.br</a></footer>
</body>
</html>
