<!doctype html><html data-theme="light"><head><meta charset="utf-8">
<link rel="stylesheet" href="vendor/uplot/uPlot.min.css">
<style>
:root{--_bg:#faf9f6;--_card:#fff;--_card2:#f3f1ec;--_line:#e6e3dc;--_txt:#1a1a2e;--_dim:#6e6e78;
--_accent:#a8651a;--_hot:#b02e22;--_warm:#7a3b0e;--_cool:#1a3a5c;--_neu:#9c9c96;
--_mono:'JetBrains Mono',ui-monospace,Menlo,monospace}
body{background:var(--_bg);color:var(--_txt);font-family:system-ui;margin:0;padding:18px;max-width:760px}
h3{font-size:13px;color:var(--_dim);margin:18px 0 6px;font-weight:600}
.box{background:var(--_card);border:1px solid var(--_line);border-radius:10px;padding:10px}
#err{color:#b02e22;font-family:monospace;font-size:12px;white-space:pre-wrap}
</style></head><body>
<div id="err"></div>
<h3>upPrice — PETR4 (preço + cone + MM + valor-justo)</h3><div class="box"><div id="c1" style="height:240px"></div></div>
<h3>upOscillator — risk-on/off</h3><div class="box"><div id="c2" style="height:120px"></div></div>
<h3>upScatter — quadrantes Lead-Lag</h3><div class="box"><div id="c3" style="height:200px"></div></div>
<script src="vendor/uplot/uPlot.iife.min.js"></script>
<script src="uplot-charts.js"></script>
<script>
var ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpjanRrZ2x0cnhkbmxhY2V6cG55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMTk3MDQsImV4cCI6MjA5NTc5NTcwNH0.CkEmnGCSTfF-9FjjebyeBUFV0-vW6CsfpyBea6cLCUs";
var API="https://zcjtkgltrxdnlacezpny.supabase.co/functions/v1/radar-api/v1/serie?codigo=petr4";
function E(m){document.getElementById('err').textContent+=m+"\n";}
if(!window.RPUplot){E("ERRO: RPUplot não carregou");}
else E("RPUplot OK: "+Object.keys(window.RPUplot).join(", "));
fetch(API,{headers:{apikey:ANON,Authorization:"Bearer "+ANON}}).then(function(r){return r.json()}).then(function(s){
  E("dados OK: hist="+(s.hist||[]).length+" cone="+(s.cone?"sim":"nao")+" risco="+(s.risco?"sim":"nao"));
  try{window.RPUplot.upPrice(document.getElementById('c1'),s,{pro:true});}catch(e){E("upPrice ERRO: "+e.message);}
  try{if(s.risco)window.RPUplot.upOscillator(document.getElementById('c2'),s.risco,{});}catch(e){E("upOscillator ERRO: "+e.message);}
  try{if(s.scatter)window.RPUplot.upScatter(document.getElementById('c3'),s.scatter);else E("(sem scatter nesse ticker)");}catch(e){E("upScatter ERRO: "+e.message);}
}).catch(function(e){E("fetch ERRO: "+e.message);});
</script></body></html>
