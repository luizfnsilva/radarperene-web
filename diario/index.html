<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Relatório — Radar Perene</title>
<meta name="description" content="Relatório do Radar Perene — leitura completa do dia, da semana e do mês. Conteúdo exclusivo para assinantes; o público vê o snapshot numérico do dia.">
<meta name="robots" content="noindex, follow"><!-- página de membro: não indexar o corpo gateado -->
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" type="image/svg+xml" href="/icon-light.svg" media="(prefers-color-scheme: light)">
<link rel="icon" type="image/svg+xml" href="/icon-dark.svg" media="(prefers-color-scheme: dark)">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="mask-icon" href="/safari-pinned-tab.svg" color="#131521">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#faf9f6; --surface:#ffffff; --surface2:#f3f1ec; --line:#e6e3dc; --txt:#1a1a2e; --txt2:#3a3a45; --dim:#6e6e78;
    --gold:#a8651a; --gold2:#8a4b38; --hot:#b02e22; --warm:#7a3b0e; --cool:#1a3a5c; --neu:#9c9c96; --gold-ink:#94560f; --btn-ink:#fff; --btn-bg:#1a1a2e;
    --serif:'Newsreader',Georgia,serif; --sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  html[data-theme=dark]{
    --bg:#0e1217; --surface:#161b22; --surface2:#1c222b; --line:#28303a; --txt:#eceef1; --txt2:#c2c8d0; --dim:#8a929e;
    --gold:#d9a441; --gold2:#e8c572; --hot:#e0533d; --warm:#d98a3d; --cool:#5b8fd0; --neu:#6b7682; --gold-ink:#d9a441; --btn-ink:#0a0c0f; --btn-bg:var(--gold);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--sans);line-height:1.65;-webkit-font-smoothing:antialiased}
  a{color:var(--gold);text-decoration:none} a:hover{text-decoration:underline}
  .top{display:flex;align-items:center;justify-content:space-between;max-width:1080px;margin:0 auto;padding:16px 22px;gap:12px}
  .brand{display:flex;align-items:center;gap:6px}
  .brand .logo-w{display:block;height:35px;width:auto}
  :root[data-theme="dark"] .logo-w-light{display:none}
  :root:not([data-theme="dark"]) .logo-w-dark{display:none}
  #me-seal{display:none;font-size:11px;background:#b8801f;color:#0a0c0f;padding:2px 9px;border-radius:20px;font-weight:700}
  #me-biblioteca{display:none;font-size:12px}
  .lang{font-size:12px;color:var(--dim);display:flex;align-items:center;gap:8px}
  main{max-width:820px;margin:0 auto;padding:8px 22px 80px}
  .crumb{font-size:12.5px;color:var(--dim);margin:6px 0 18px}
  h1.t{font-family:var(--serif);font-weight:500;font-size:clamp(24px,4vw,33px);line-height:1.2;margin:0 0 4px}
  .meta{font-size:12.5px;color:var(--dim);margin:0 0 22px}
  /* bloco numérico público */
  .snap{background:var(--surface2);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin:0 0 26px}
  .snap h2{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin:0 0 14px;font-weight:600}
  .ix{display:flex;flex-wrap:wrap;gap:14px}
  .ix .card{flex:1 1 150px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:12px 14px}
  .ix .nm{font-size:12.5px;color:var(--dim);margin-bottom:3px}
  .ix .v{font-family:var(--mono);font-size:24px;font-weight:600;color:var(--txt)}
  .ix .r{font-size:11.5px;color:var(--gold);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
  .snap .nota{font-size:11.5px;color:var(--dim);margin:12px 0 0}
  /* corpo / gancho */
  .corpo{font-size:16.5px;color:var(--txt2);max-width:66ch}
  .corpo h1{font-family:var(--serif);font-weight:500;font-size:26px;color:var(--txt);margin:0 0 14px}
  .corpo h2{font-family:var(--serif);font-weight:500;font-size:21px;color:var(--txt);margin:30px 0 10px}
  .corpo h3{font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);margin:26px 0 8px}
  .corpo p{margin:0 0 16px} .corpo ul{margin:0 0 16px;padding-left:20px} .corpo li{margin:4px 0}
  .corpo hr{border:0;border-top:1px solid var(--line);margin:26px 0}
  .corpo em{color:var(--dim)} .corpo .selo{display:block;font-size:12px;color:var(--dim);margin-top:4px}
  .gate{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:30px;text-align:center;max-width:560px;margin:8px auto 0}
  .gate .badge{display:inline-block;border:1px solid var(--gold);color:var(--gold-ink);border-radius:999px;padding:4px 14px;font-size:11.5px;font-weight:600;letter-spacing:.07em;margin-bottom:14px;text-transform:uppercase}
  .gate h3{font-family:var(--serif);font-weight:500;font-size:clamp(20px,3vw,26px);margin:0 0 10px;color:var(--txt)}
  .gate p{color:var(--dim);max-width:46ch;margin:0 auto 20px;font-size:15px}
  .gate .btns{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
  .btn{display:inline-block;background:var(--btn-bg);color:var(--btn-ink);border:0;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none}
  .btn.ghost{background:transparent;color:var(--gold);border:1px solid var(--gold)}
  .btn:hover{text-decoration:none;opacity:.92}
  .muted{color:var(--dim);font-size:14px}
  footer{max-width:820px;margin:0 auto;padding:24px 22px;border-top:1px solid var(--line);font-size:12.5px;color:var(--dim)}
</style>
<script>(function(){try{var t=localStorage.getItem("rp-theme");if(t!=="light"&&t!=="dark")t=(window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","light");}})();</script>
</head>
<body>
<div class="top">
  <div class="brand">
    <a href="/" aria-label="Radar Perene — início"><img class="logo-w logo-w-light" src="/logo-light.svg" alt="Radar Perene" width="139" height="35"><img class="logo-w logo-w-dark" src="/logo-dark.svg" alt="Radar Perene" width="139" height="35"></a>
    <span id="me-seal"></span>
    <a id="me-biblioteca" href="/biblioteca/">Biblioteca</a>
  </div>
  <div class="lang"><a href="/biblioteca/">Biblioteca</a> · <a href="#" id="me-login">Entrar</a></div>
</div>

<main>
  <div class="crumb"><a href="/biblioteca/">← Biblioteca do Assinante</a></div>
  <h1 class="t" id="titulo">Relatório</h1>
  <p class="meta" id="meta"></p>

  <section class="snap" id="snap" style="display:none">
    <h2 id="snap-h">Snapshot do dia · números</h2>
    <div class="ix" id="ix"></div>
    <p class="nota">Snapshot numérico congelado. Distribuição empírica — não é previsão.</p>
  </section>

  <div id="conteudo"><p class="muted">Carregando…</p></div>
</main>

<footer>
  Radar Perene · <a href="/biblioteca/">Biblioteca do Assinante</a> · <a href="/">início</a><br>
  Leitura descritiva sobre fonte pública. Não constitui recomendação.
</footer>

<script src="/vendor/supabase-js/supabase.min.js"></script>
<script src="/auth.js"></script>
<script>
(function(){
  var EN = location.search.indexOf("lang=en")>=0 || location.hostname==="radarperene.com";
  var API = location.origin + "/api/v1";
  var ANON = (window.RP_AUTH && window.RP_AUTH.ANON) || "";
  var TIPO_NOME = { diario:(EN?"Daily report":"Relatório diário"), semanal:(EN?"Weekly report":"Relatório semanal"), mensal:(EN?"Monthly memo":"Memo mensal") };

  // ── resolve tipo + data (query OU último segmento do path /diario/<data>) ──
  var qp = new URLSearchParams(location.search);
  var tipo = (qp.get("tipo")||"diario").toLowerCase();
  if(["diario","semanal","mensal"].indexOf(tipo)<0) tipo="diario";
  var data = qp.get("data") || qp.get("d") || "";
  if(!data){ var seg=location.pathname.replace(/\/+$/,"").split("/").pop(); if(/^\d{4}-\d{2}-\d{2}$/.test(seg)) data=seg; }

  var elTit=document.getElementById("titulo"), elMeta=document.getElementById("meta"), elCont=document.getElementById("conteudo");
  document.querySelector(".crumb a").textContent = (EN?"← Subscriber Library":"← Biblioteca do Assinante");

  if(!/^\d{4}-\d{2}-\d{2}$/.test(data)){
    elTit.textContent = (EN?"Report not found":"Relatório não encontrado");
    elCont.innerHTML = '<p class="muted">'+(EN?"Open a report from the ":"Abra um relatório pela ")+'<a href="/biblioteca/">'+(EN?"Library":"Biblioteca")+'</a>.</p>';
    return;
  }
  elTit.textContent = TIPO_NOME[tipo] + " · " + data;
  elMeta.textContent = (EN?"Radar Perene — reading for ":"Radar Perene — leitura de ") + data;

  function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  // markdown mínimo e seguro: escapa tudo, depois reativa um allowlist pequeno.
  function inline(s){
    return esc(s)
      .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
      .replace(/(^|[^*])\*([^*]+)\*/g,"$1<em>$2</em>")
      .replace(/&lt;sub&gt;/g,'<span class="selo">').replace(/&lt;\/sub&gt;/g,"</span>");
  }
  function mdToHtml(md){
    var blocos = String(md||"").replace(/\r/g,"").split(/\n{2,}/), out=[];
    blocos.forEach(function(b){
      b=b.trim(); if(!b) return;
      if(/^#{1,3}\s/.test(b)){ var h=b.match(/^#+/)[0].length, txt=b.replace(/^#+\s/,""); out.push("<h"+h+">"+inline(txt)+"</h"+h+">"); return; }
      if(/^---+$/.test(b)){ out.push("<hr>"); return; }
      var linhas=b.split("\n");
      if(linhas.every(function(l){return /^[-*]\s/.test(l.trim());})){
        out.push("<ul>"+linhas.map(function(l){return "<li>"+inline(l.replace(/^[-*]\s/,""))+"</li>";}).join("")+"</ul>"); return;
      }
      out.push("<p>"+linhas.map(inline).join("<br>")+"</p>");
    });
    return out.join("\n");
  }

  // ── snapshot numérico público (sempre que existir p/ a data) ──
  function fmtNum(v){ return (v==null)?"—":(Math.round(v*10)/10); }
  function reg(s){ return String(s||"").replace(/_/g," "); }
  fetch(API+"/snapshot?date="+data+(EN?"&lang=en":""),{headers:{apikey:ANON,Authorization:"Bearer "+ANON}})
    .then(function(r){ return r.ok?r.json():null; })
    .then(function(d){
      if(!d) return;
      var ip=d.indices_proprietarios||{}, cards=[];
      if(ip.anima) cards.push({nm:(EN?"Ânima Index":"Índice Ânima"),v:fmtNum(ip.anima.valor),r:reg(ip.anima.regime)});
      if(ip.risco_perene) cards.push({nm:(EN?"Perene Risk Index":"Índice de Risco Perene"),v:fmtNum(ip.risco_perene.valor),r:reg(ip.risco_perene.regime)});
      (d.indicadores||[]).filter(function(x){return !x.proprietario;}).slice(0,2).forEach(function(x){
        cards.push({nm:x.nome,v:(x.valor==null?"—":x.valor)+(x.unidade||""),r:reg(x.classificacao)});
      });
      if(!cards.length) return;
      document.getElementById("ix").innerHTML = cards.map(function(c){
        return '<div class="card"><div class="nm">'+esc(c.nm)+'</div><div class="v">'+esc(c.v)+'</div><div class="r">'+esc(c.r)+'</div></div>';
      }).join("");
      if(EN) document.getElementById("snap-h").textContent="Snapshot · numbers";
      document.getElementById("snap").style.display="block";
    }).catch(function(){});

  // ── conteúdo gateado (corpo p/ premium · gancho p/ free) ──
  function gateHtml(gancho){
    return '<div class="gate"><span class="badge">'+(EN?"Subscribers":"Assinantes")+'</span>'
      + '<h3>'+esc(EN?"The full reading is for subscribers":"A leitura completa é para assinantes")+'</h3>'
      + '<p>'+esc(gancho||(EN?"Daily, weekly and monthly reports — subscribers only.":"Relatórios diários, semanais e mensais — exclusivos para assinantes."))+'</p>'
      + '<div class="btns"><a class="btn" href="'+(EN?"/subscribe":"/assine")+'">'+(EN?"See subscriptions":"Ver assinaturas")+'</a></div>'
      + '<p style="margin:16px 0 0"><a href="#" id="gate-login" class="muted">'+(EN?"Already a subscriber? Sign in":"Já é assinante? Entrar")+'</a></p></div>';
  }
  function carregar(){
    var tok = (window.RP_AUTH && window.RP_AUTH.token && window.RP_AUTH.token()) || ANON;
    fetch(API+"/biblioteca/item?tipo="+tipo+"&data="+data+(EN?"&lang=en":""),
      {headers:{apikey:ANON,Authorization:"Bearer "+tok}})
      .then(function(r){ return r.json().then(function(j){return {ok:r.ok,status:r.status,j:j};}); })
      .then(function(res){
        if(res.ok && res.j && res.j.corpo_md){
          if(res.j.titulo){ elTit.textContent=res.j.titulo; }
          elCont.className="corpo"; elCont.innerHTML = mdToHtml(res.j.corpo_md);
          return;
        }
        elCont.className=""; elCont.innerHTML = gateHtml(res.j && res.j.gancho);
        var gl=document.getElementById("gate-login");
        if(gl) gl.addEventListener("click",function(e){e.preventDefault(); if(window.RP_AUTH&&window.RP_AUTH.login) window.RP_AUTH.login(); });
      }).catch(function(){ elCont.innerHTML='<p class="muted">'+(EN?"Could not load.":"Não foi possível carregar.")+'</p>'; });
  }
  window.addEventListener("rp-premium-change", carregar);
  carregar();
})();
</script>
</body>
</html>
